name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install -e . || python -m pip install .
          fi
          python -m pip install pytest ruff || true

      - name: Lint (best effort)
        run: |
          if command -v ruff >/dev/null 2>&1; then
            ruff check . || true
          fi

      - name: Run tests (best effort)
        run: |
          if [ -d tests ] || ls test_*.py >/dev/null 2>&1; then
            python -m pytest -q || true
          else
            echo "No tests directory; smoke import check"
            python - <<'PY'
import importlib, pathlib, sys
root = pathlib.Path('.')
cands = [p for p in root.iterdir() if p.is_dir() and (p/ '__init__.py').exists()]
print('packages', [c.name for c in cands[:10]])
PY
          fi

