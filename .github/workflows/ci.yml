name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # only cache when lock/deps files exist (avoids setup-python hard fail)
          cache: ${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/uv.lock') != '' && 'pip' || '' }}
          cache-dependency-path: |
            **/requirements*.txt
            **/pyproject.toml
            **/uv.lock


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          while IFS= read -r f; do
            pip install -r "$f" || true
          done < <(find . -maxdepth 3 -name 'requirements*.txt' -not -path './.venv/*' | head -8)
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]" || pip install -e . || pip install . || true
          fi
          pip install pytest ruff

      - name: Required project files
        run: |
          test -f README.md
          test -f LICENSE || test -f LICENSE.md

      - name: Ruff (non-blocking)
        run: ruff check . || true

      - name: Pytest (hard, tests/ only)
        run: |
          set -e
          if [ -d tests ]; then
            python -m pytest -q tests
          elif [ -d Test ]; then
            python -m pytest -q Test
          elif [ -d test ]; then
            python -m pytest -q test
          else
            mapfile -t roots < <(ls test_*.py 2>/dev/null || true)
            if [ ${#roots[@]} -gt 0 ]; then
              python -m pytest -q "${roots[@]}"
            else
              echo "No tests directory; structure checks only"
            fi
          fi
