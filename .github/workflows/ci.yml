name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & tests (uv)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg
      ZDEM_FORCE_PYQTGRAPH: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System libs (headless Qt / OpenGL)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 || true

      - name: Sync dependencies (frozen)
        run: |
          if [ -f uv.lock ]; then
            uv sync --frozen --extra dev || uv sync --frozen
          else
            uv sync --extra dev || uv sync
          fi

      - name: Required project files
        run: |
          test -f README.md
          test -f LICENSE || test -f LICENSE.md

      - name: Ruff (hard — critical rules)
        run: |
          uv run ruff check . --select E9,F63,F7,F82

      - name: Pytest (hard, tests/ only)
        run: |
          set -e
          if [ -d tests ]; then
            uv run pytest -q tests
          elif [ -d Test ]; then
            uv run pytest -q Test
          else
            echo "No tests/ directory"
            exit 1
          fi

      - name: pip-audit (advisory)
        continue-on-error: true
        run: |
          uv run pip install pip-audit
          uv run pip-audit || true
